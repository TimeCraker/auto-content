<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0c0a1f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="llm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="out" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>

  <!-- title -->
  <text x="640" y="40" text-anchor="middle" font-size="22" font-weight="800" fill="#e2e8f0">架构与数据流 · ARCHITECTURE</text>
  <text x="640" y="62" text-anchor="middle" font-size="12" fill="#64748b" letter-spacing="4">CRAWL → GENERATE → RENDER → REVIEW</text>

  <!-- stage labels -->
  <g font-size="10" font-weight="700" fill="#475569" letter-spacing="2">
    <text x="160" y="100">SOURCES</text>
    <text x="460" y="100">CRAWLER</text>
    <text x="760" y="100">GENERATOR (LLM)</text>
    <text x="1060" y="100">OUTPUTS</text>
  </g>

  <!-- divider lines -->
  <line x1="310" y1="90" x2="310" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="610" y1="90" x2="610" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="910" y1="90" x2="910" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- SOURCES column -->
  <g transform="translate(40, 130)">
    <rect width="240" height="60" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#f9a8d4">📕 小红书热榜</text>
    <text x="20" y="48" font-size="11" fill="#94a3b8">cheerio + puppeteer 兜底</text>
  </g>
  <g transform="translate(40, 220)">
    <rect width="240" height="60" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#93c5fd">🔵 知乎热榜</text>
    <text x="20" y="48" font-size="11" fill="#94a3b8">API 优先 + 滚动加载</text>
  </g>
  <g transform="translate(40, 310)">
    <rect width="240" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#fcd34d">🐟 闲鱼热门</text>
    <text x="20" y="48" font-size="11" fill="#94a3b8">移动 H5 UA 模拟</text>
  </g>

  <!-- CRAWLER column -->
  <g transform="translate(340, 170)">
    <rect width="240" height="200" rx="12" fill="#0f172a" stroke="url(#line)" stroke-width="2" filter="url(#glow)"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#22d3ee">crawl-trends.ts</text>
    <line x1="20" y1="44" x2="220" y2="44" stroke="#1e293b"/>
    <text x="20" y="68" font-size="11" fill="#cbd5e1">· 关键词热度打分</text>
    <text x="20" y="88" font-size="11" fill="#cbd5e1">· 跨平台去重</text>
    <text x="20" y="108" font-size="11" fill="#cbd5e1">· 趋势衰减算法</text>
    <text x="20" y="128" font-size="11" fill="#cbd5e1">· Markdown 卡片化</text>
    <text x="20" y="158" font-size="10" font-weight="700" fill="#64748b" letter-spacing="1">OUTPUT</text>
    <rect x="20" y="166" width="200" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1"/>
    <text x="120" y="181" text-anchor="middle" font-size="11" fill="#67e8f9">input/trends.json</text>
  </g>

  <!-- GENERATOR column -->
  <g transform="translate(640, 130)">
    <rect width="240" height="80" rx="10" fill="url(#llm)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🤖 LLM Provider</text>
    <text x="120" y="54" text-anchor="middle" font-size="11" fill="#e9d5ff">OpenAI 兼容协议</text>
    <text x="120" y="70" text-anchor="middle" font-size="10" fill="#c4b5fd">DeepSeek · SiliconFlow · 智谱</text>
  </g>
  <g transform="translate(640, 230)">
    <rect width="240" height="120" rx="10" fill="#0f172a" stroke="url(#line)" stroke-width="2" filter="url(#glow)"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#a855f7">generate-drafts.ts</text>
    <line x1="20" y1="44" x2="220" y2="44" stroke="#1e293b"/>
    <text x="20" y="68" font-size="11" fill="#cbd5e1">· 平台风格 prompt 模板</text>
    <text x="20" y="88" font-size="11" fill="#cbd5e1">· 标题党过滤 / 敏感词</text>
    <text x="20" y="108" font-size="11" fill="#cbd5e1">· 字数与 emoji 控制</text>
  </g>
  <g transform="translate(640, 370)">
    <rect width="240" height="120" rx="10" fill="#0f172a" stroke="url(#line)" stroke-width="2" filter="url(#glow)"/>
    <text x="120" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#ec4899">to-image.ts</text>
    <line x1="20" y1="44" x2="220" y2="44" stroke="#1e293b"/>
    <text x="20" y="68" font-size="11" fill="#cbd5e1">· HTML 模板 → PNG</text>
    <text x="20" y="88" font-size="11" fill="#cbd5e1">· 9 套主题色板</text>
    <text x="20" y="108" font-size="11" fill="#cbd5e1">· 1080×1440 / 1080×1080</text>
  </g>

  <!-- OUTPUTS column -->
  <g transform="translate(940, 130)">
    <rect width="300" height="60" rx="10" fill="url(#out)" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#86efac">📝 草稿库</text>
    <text x="20" y="48" font-size="11" fill="#cbd5e1">output/drafts/*.md</text>
  </g>
  <g transform="translate(940, 220)">
    <rect width="300" height="60" rx="10" fill="url(#out)" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#86efac">🎨 封面图</text>
    <text x="20" y="48" font-size="11" fill="#cbd5e1">output/images/*.png</text>
  </g>
  <g transform="translate(940, 310)">
    <rect width="300" height="60" rx="10" fill="url(#out)" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#86efac">🖥️ Web 工作台</text>
    <text x="20" y="48" font-size="11" fill="#cbd5e1">React + Vite · 人工审核发布</text>
  </g>

  <!-- arrows from sources to crawler -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <path d="M 280 160 Q 310 160 340 200"/>
    <path d="M 280 250 L 340 260"/>
    <path d="M 280 340 Q 310 340 340 320"/>
  </g>
  <!-- crawler to generator -->
  <path d="M 580 270 L 640 270" stroke="url(#line)" stroke-width="2" fill="none" marker-end="url(#arrow)" filter="url(#glow)"/>
  <!-- generator to image renderer -->
  <path d="M 760 350 L 760 370" stroke="url(#line)" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- to outputs -->
  <g stroke="url(#line)" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 880 270 L 940 160"/>
    <path d="M 880 430 L 940 250"/>
    <path d="M 880 430 L 940 340"/>
  </g>

  <!-- footer -->
  <text x="640" y="540" text-anchor="middle" font-size="10" fill="#475569">© 2026 TimeCraker · MIT License · 仅生成草稿，所有内容须人工审核后手动发布</text>
</svg>
