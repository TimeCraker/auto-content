<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c0a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <circle cx="200" cy="160" r="220" fill="url(#glow)"/>
  <circle cx="1080" cy="160" r="180" fill="url(#glow)"/>

  <!-- decorative lines -->
  <path d="M 0 240 Q 320 200 640 240 T 1280 240" stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 0 260 Q 320 220 640 260 T 1280 260" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- main title -->
  <text x="640" y="150" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif" font-size="64" font-weight="900" fill="url(#accent)" letter-spacing="-2">Auto Content</text>
  <text x="640" y="195" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif" font-size="20" font-weight="500" fill="#cbd5e1" letter-spacing="6">流量引擎 · TRAFFIC ENGINE</text>

  <!-- platforms pills -->
  <g transform="translate(640, 250)">
    <g transform="translate(-300, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#f9a8d4">📕 小红书</text>
    </g>
    <g transform="translate(-100, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#93c5fd">🔵 知乎</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fcd34d">🐟 闲鱼</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1"/>
      <text x="0" y="5" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#86efac">⚡ 自动化</text>
    </g>
  </g>

  <!-- corner badge -->
  <g transform="translate(60, 60)">
    <text font-family="ui-monospace,SF Mono,monospace" font-size="11" fill="#64748b">v1.0.0 · MIT License</text>
  </g>
  <g transform="translate(1220, 60)" text-anchor="end">
    <text font-family="ui-monospace,SF Mono,monospace" font-size="11" fill="#64748b">github.com/TimeCraker/auto-content</text>
  </g>
</svg>
